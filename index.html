<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARAOKE DULETATA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ... Mantém o CSS anterior ... */
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 32px; font-weight: 800; color: #f59e0b; text-transform: uppercase; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #1e293b; color: #94a3b8; border-radius: 8px; border: 2px solid transparent; cursor: pointer; text-align: center; }
        .tab-btn.active { border-color: #f59e0b; color: #fff; background: #334155; }
        .search-box { background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .input-search { width: 100%; padding: 12px; border: 2px solid #334155; border-radius: 8px; background: #0f172a; color: #fff; }
        .result-item { background: #1e293b; padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; border-left: 4px solid #f59e0b; }
        .music-info { flex: 1; }
        .star-btn { font-size: 20px; color: #64748b; cursor: pointer; padding: 5px; }
        .star-btn.active { color: #f59e0b; }
        .whatsapp-btn { background-color: #25d366; color: white; padding: 8px 12px; border-radius: 6px; text-decoration: none; }
    </style>
</head>
<body>

<div id="user-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;">
    <div style="background: #1e293b; padding: 30px; border-radius: 12px; text-align: center;">
        <h2>Quem está acessando?</h2>
        <input type="text" id="user-name" style="padding: 10px; border-radius: 5px; width: 250px;">
        <button onclick="definirUsuario()" style="padding: 10px 20px; background: #f59e0b; border: none; border-radius: 5px; cursor: pointer;">Entrar</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="logo">KARAOKE DULETATA</div>
        <div id="user-display" style="color: #f59e0b; font-weight: bold;"></div>
    </div>
    
    <div class="tabs">
        <div class="tab-btn active" id="tab-all" onclick="mudarTab('todas')">Todas</div>
        <div class="tab-btn" id="tab-fav" onclick="mudarTab('favoritas')">Favoritas</div>
    </div>

    <div class="search-box">
        <input type="text" class="input-search" id="search-input" placeholder="Pesquisar..." oninput="filtrarMusicas()">
    </div>

    <div id="results-container"></div>
</div>

<script>
    const API_URL = "https://sheetdb.io/api/v1/xv2c48l7hux45";
    let currentUser = "";
    let catalogoMusicas = [];
    let meusFavoritos = []; // Lista de números de músicas favoritaras do usuário logado
    let viewMode = 'todas';

    async function definirUsuario() {
        const name = document.getElementById('user-name').value.trim();
        if (name) {
            currentUser = name;
            document.getElementById('user-display').textContent = `Olá, ${name}!`;
            document.getElementById('user-modal').style.display = 'none';
            await carregarFavoritos();
            filtrarMusicas();
        }
    }

    // Busca apenas os favoritos do usuário na planilha
    async function carregarFavoritos() {
        try {
            const url = `${API_URL}/search?Usuario=${encodeURIComponent(currentUser)}`;
            const response = await fetch(url);
            const data = await response.json();
            meusFavoritos = data.map(item => item.MusicaNumero);
        } catch (e) {
            console.error("Erro ao carregar favoritos:", e);
        }
    }

    async function toggleFavorito(numero) {
        const isFav = meusFavoritos.includes(numero);

        if (isFav) {
            // Remover da Planilha
            await fetch(`${API_URL}/Usuario/${encodeURIComponent(currentUser)}/MusicaNumero/${numero}`, { method: 'DELETE' });
            meusFavoritos = meusFavoritos.filter(n => n !== numero);
        } else {
            // Adicionar na Planilha
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [{ "Usuario": currentUser, "MusicaNumero": numero }] })
            });
            meusFavoritos.push(numero);
        }
        filtrarMusicas();
    }

    function mudarTab(mode) {
        viewMode = mode;
        document.getElementById('tab-all').classList.toggle('active', mode === 'todas');
        document.getElementById('tab-fav').classList.toggle('active', mode === 'favoritas');
        filtrarMusicas();
    }

    function filtrarMusicas() {
        const query = document.getElementById('search-input').value.toLowerCase();
        let lista = catalogoMusicas;

        if (viewMode === 'favoritas') {
            lista = lista.filter(m => meusFavoritos.includes(m.numero));
        }

        if (query) {
            lista = lista.filter(m => m.item.toLowerCase().includes(query) || m.numero.includes(query));
        }

        renderizar(lista);
    }

    function renderizar(lista) {
        const container = document.getElementById('results-container');
        container.innerHTML = "";
        lista.slice(0, 100).forEach(m => {
            const isFav = meusFavoritos.includes(m.numero);
            container.innerHTML += `
                <div class="result-item">
                    <div class="star-btn ${isFav ? 'active' : ''}" onclick="toggleFavorito('${m.numero}')">
                        <i class="fa-${isFav ? 'solid' : 'regular'} fa-star"></i>
                    </div>
                    <div class="music-info">
                        <div>${m.item}</div>
                        <div style="color: #f59e0b; font-weight:bold;">Nº ${m.numero}</div>
                    </div>
                </div>
            `;
        });
    }

    // Carrega catálogo local (TXT)
    async function carregarCatalogoTXT() {
        const resposta = await fetch('CATÁLOGO DE MÚSICAS.txt');
        const texto = await resposta.text();
        const linhas = texto.split(/\r?\n/);
        linhas.forEach(linha => {
            let match = linha.match(/^(\d+)\s+(.+)$/);
            if (match) catalogoMusicas.push({ numero: match[1], item: match[2].trim() });
        });
    }

    window.onload = carregarCatalogoTXT;
</script>
</body>
</html>
