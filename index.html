<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buscador de Músicas - Party Box</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; margin-top: 10px; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 32px; font-weight: 800; color: #f59e0b; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 10px rgba(245, 158, 11, 0.2); }
        .subtitle { color: #94a3b8; font-size: 14px; margin: 5px 0 0 0; }
        .search-box { position: sticky; top: 10px; z-index: 100; background: #1e293b; padding: 12px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); display: flex; gap: 8px; }
        input[type="text"] { flex: 1; padding: 14px; border: 2px solid #334155; border-radius: 8px; font-size: 16px; background-color: #0f172a; color: #fff; outline: none; }
        input[type="text"]:focus { border-color: #3b82f6; }
        .status { text-align: center; color: #64748b; font-size: 12px; margin-top: 5px; }
        .results-wrapper { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .result-item { background: #1e293b; padding: 14px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #f59e0b; animation: fadeIn 0.2s ease-in-out; }
        .music-info { flex: 1; padding-right: 10px; }
        .music-title { font-size: 15px; font-weight: 600; color: #fff; word-break: break-word; }
        
        .actions { display: flex; align-items: center; gap: 10px; }
        .music-number { font-size: 18px; font-weight: 800; color: #f59e0b; background: #0f172a; padding: 8px 12px; border-radius: 6px; min-width: 70px; text-align: center; }
        
        /* Botão do WhatsApp */
        .whatsapp-btn { background-color: #25d366; color: white; border: none; border-radius: 6px; padding: 10px 12px; font-size: 18px; cursor: pointer; transition: background 0.3s, transform 0.1s; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .whatsapp-btn:hover { background-color: #20ba5a; transform: scale(1.05); }
        .whatsapp-btn:active { transform: scale(0.95); }

        .no-results, .loading { text-align: center; padding: 40px 20px; color: #94a3b8; background: #1e293b; border-radius: 8px; border: 1px dashed #334155; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">Karaokê Party Box</div>
        <div class="subtitle">Catálogo Digital com Envio por WhatsApp</div>
    </div>
    
    <div class="search-box">
        <input type="text" id="search-input" placeholder="A carregar o catálogo..." disabled>
    </div>
    <div id="status-load" class="status">A preparar o sistema...</div>

    <div id="results-container" class="results-wrapper">
        <div class="loading">Aguarde, a processar as músicas...</div>
    </div>
</div>

<script>
    // Configuração do número do WhatsApp:
    // Deixe vazio "" para o cliente escolher o contato na hora.
    // Ou coloque o número com código do país se quiser fixar (Ex: "5511999999999" para Brasil ou "351912345678" para Portugal)
    const NUMERO_WHATSAPP = ""; 

    let catalogoMusicas = [];

    async function carregarCatalogoTXT() {
        const statusLoad = document.getElementById('status-load');
        const searchInput = document.getElementById('search-input');
        const container = document.getElementById('results-container');

        try {
            const resposta = await fetch('CATÁLOGO DE MÚSICAS.txt');
            if (!resposta.ok) throw new Error("Ficheiro não encontrado");
            
            const textoCompleto = await resposta.text();
            const linhas = textoCompleto.split(/\r?\n/);
            
            for (let i = 0; i < linhas.length; i++) {
                let linhaAtual = linhas[i].trim();
                if (linhaAtual === "" || linhaAtual.includes("CATÁLOGO DE MÚSICAS")) continue;

                let regexMesmaLinha = /^(\d+)\s+(.+)$/;
                let match = linhaAtual.match(regexMesmaLinha);

                if (match) {
                    catalogoMusicas.push({ 
                        numero: match[1], 
                        item: match[2].replace(/^["']|["']$/g, '').strip() 
                    });
                } 
                else if (/^\d+$/.test(linhaAtual)) {
                    let numero = linhaAtual;
                    let proximaLinha = (linhas[i + 1] || "").trim();
                    
                    if (proximaLinha !== "" && !/^\d+$/.test(proximaLinha)) {
                        catalogoMusicas.push({ 
                            numero: numero, 
                            item: proximaLinha.replace(/^["']|["']$/g, '').trim() 
                        });
                        i++; 
                    }
                }
            }
            
            statusLoad.textContent = `${catalogoMusicas.length} músicas carregadas!`;
            searchInput.disabled = false;
            searchInput.placeholder = "Pesquise por artista, música ou número...";
            container.innerHTML = `<div class="no-results">Digite acima para começar a procurar!</div>`;
            searchInput.focus();
        } catch (erro) {
            statusLoad.textContent = "Erro ao carregar o catálogo.";
            container.innerHTML = `<div class="no-results" style="color:#ef4444;">Erro: Certifique-se de que o ficheiro 'CATÁLOGO DE MÚSICAS.txt' está correto.</div>`;
            console.error(erro);
        }
    }

    function buscarMusica() {
        const input = document.getElementById('search-input').value.trim().toLowerCase();
        const container = document.getElementById('results-container');
        
        container.innerHTML = "";

        if (input === "") {
            container.innerHTML = `<div class="no-results">Digite algo para começar a procurar!</div>`;
            return;
        }

        const resultados = catalogoMusicas.filter(musica => 
            musica.item.toLowerCase().includes(input) || musica.numero === input
        );

        const limiteResultados = resultados.slice(0, 100);

        if (limiteResultados.length > 0) {
            let htmlGerado = "";
            limiteResultados.forEach(musica => {
                // Prepara o texto da mensagem para o WhatsApp
                const mensagemFomada = `Olá! Gostaria de cantar a música:\nNº ${musica.numero} - ${musica.item}`;
                const mensagemCodificada = encodeURIComponent(mensagemFomada);
                
                // Cria o link do WhatsApp usando a API oficial
                const urlWhatsapp = `https://api.whatsapp.com/send?phone=${NUMERO_WHATSAPP}&text=${mensagemCodificada}`;

                htmlGerado += `
                    <div class="result-item">
                        <div class="music-info">
                            <div class="music-title">${musica.item}</div>
                        </div>
                        <div class="actions">
                            <div class="music-number">${musica.numero}</div>
                            <a href="${urlWhatsapp}" target="_blank" class="whatsapp-btn" title="Enviar para o WhatsApp">
                                <i class="fab fa-whatsapp"></i>
                            </a>
                        </div>
                    </div>
                `;
            });
            
            if (resultados.length > 100) {
                htmlGerado += `<div class="status" style="padding:10px;">A mostrar 100 de ${resultados.length} resultados.</div>`;
            }
            
            container.innerHTML = htmlGerado;
        } else {
            container.innerHTML = `<div class="no-results">Nenhuma música encontrada para "${document.getElementById('search-input').value}".</div>`;
        }
    }

    document.getElementById('search-input').addEventListener('input', buscarMusica);
    window.onload = carregarCatalogoTXT;
</script>

</body>
</html>
