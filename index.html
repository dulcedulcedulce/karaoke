<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARAOKE DULETATA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 32px; font-weight: 800; color: #f59e0b; text-transform: uppercase; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #1e293b; color: #94a3b8; border-radius: 8px; border: 2px solid transparent; cursor: pointer; text-align: center; }
        .tab-btn.active { border-color: #f59e0b; color: #fff; background: #334155; }
        
        .search-box { background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .input-search { width: 100%; padding: 12px; border: 2px solid #334155; border-radius: 8px; background: #0f172a; color: #fff; outline: none; }
        
        .result-item { background: #1e293b; padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; border-left: 4px solid #f59e0b; }
        .music-info { flex: 1; min-width: 0; }
        .action-btn { font-size: 17px; color: #64748b; cursor: pointer; padding: 5px; min-width: 30px; text-align: center; }
        .star-btn.active { color: #f59e0b; }
        .mic-btn.active { color: #3b82f6; }
        .bad-btn.active { color: #ef4444; }
        .good-btn.active { color: #22c55e; }
        .counter { font-size: 10px; font-weight: bold; display: block; margin-top: -2px; }
        .whatsapp-btn { background-color: #25d366; color: white; padding: 8px 12px; border-radius: 6px; text-decoration: none; font-size: 16px; }
    </style>
</head>
<body>

<div id="user-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;">
    <div style="background: #1e293b; padding: 30px; border-radius: 12px; text-align: center;">
        <h2>Quem está acessando?</h2>
        <input type="text" id="user-name" style="padding: 10px; border-radius: 5px; width: 250px;">
        <button onclick="definirUsuario()" style="padding: 10px 20px; background: #f59e0b; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Entrar</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="logo">KARAOKE DULETATA</div>
        <div id="user-display" style="color: #f59e0b; font-weight: bold;"></div>
    </div>
    
    <div class="tabs">
        <div class="tab-btn active" id="tab-all" onclick="mudarTab('todas')">Todas</div>
        <div class="tab-btn" id="tab-fav" onclick="mudarTab('favoritas')">Favoritas</div>
    </div>

    <div class="search-box">
        <input type="text" class="input-search" id="search-input" placeholder="Pesquisar..." oninput="filtrarMusicas()">
    </div>

    <div id="results-container"></div>
</div>

<script>
    const API_URL = "https://sheetdb.io/api/v1/xv2c48l7hux45";
    let currentUser = "", catalogoMusicas = [], meusFavoritos = [], minhasCantadas = {}, meusRuins = [], meusBons = [], viewMode = 'todas';

    async function definirUsuario() {
        currentUser = document.getElementById('user-name').value.trim();
        if (currentUser) {
            document.getElementById('user-display').textContent = `Olá, ${currentUser}!`;
            document.getElementById('user-modal').style.display = 'none';
            await carregarDadosPlanilha();
            filtrarMusicas();
        }
    }

    async function carregarDadosPlanilha() {
        try {
            const response = await fetch(`${API_URL}/search?Usuario=${encodeURIComponent(currentUser)}`);
            const data = await response.json();
            meusFavoritos = data.filter(i => i.Tipo === 'Favorita').map(i => i.MusicaNumero);
            meusRuins = data.filter(i => i.Tipo === 'Ruim').map(i => i.MusicaNumero);
            meusBons = data.filter(i => i.Tipo === 'Boa').map(i => i.MusicaNumero);
            minhasCantadas = {};
            data.filter(i => i.Tipo === 'Cantada').forEach(i => minhasCantadas[i.MusicaNumero] = parseInt(i.Contagem) || 1);
        } catch(e) { console.error("Erro na API"); }
    }

    async function toggleStatus(numero, tipo, isAdd) {
        if (isAdd) {
            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: [{ "Usuario": currentUser, "MusicaNumero": numero, "Tipo": tipo, "Contagem": 0 }] })
            });
        } else {
            await fetch(`${API_URL}/Usuario/${encodeURIComponent(currentUser)}/MusicaNumero/${numero}/Tipo/${tipo}`, { method: 'DELETE' });
        }
        await carregarDadosPlanilha();
        filtrarMusicas();
    }

    async function registrarCantada(numero) {
        const jaCantada = minhasCantadas[numero];
        if (jaCantada) {
            await fetch(`${API_URL}/Usuario/${encodeURIComponent(currentUser)}/MusicaNumero/${numero}/Tipo/Cantada`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ "Contagem": jaCantada + 1 })
            });
        } else {
            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: [{ "Usuario": currentUser, "MusicaNumero": numero, "Tipo": "Cantada", "Contagem": 1 }] })
            });
        }
        await carregarDadosPlanilha();
        filtrarMusicas();
    }

    function mudarTab(mode) { viewMode = mode; filtrarMusicas(); }
    
    function filtrarMusicas() {
        const query = document.getElementById('search-input').value.toLowerCase();
        let lista = catalogoMusicas;
        if (viewMode === 'favoritas') lista = lista.filter(m => meusFavoritos.includes(m.numero));
        if (query) lista = lista.filter(m => m.item.toLowerCase().includes(query) || m.numero.includes(query));
        renderizar(lista);
    }

    function renderizar(lista) {
        const container = document.getElementById('results-container');
        container.innerHTML = "";
        lista.slice(0, 100).forEach(m => {
            const isFav = meusFavoritos.includes(m.numero);
            const isRuim = meusRuins.includes(m.numero);
            const isBoa = meusBons.includes(m.numero);
            const contagem = minhasCantadas[m.numero] || 0;
            const msg = encodeURIComponent(`Olá! Gostaria de cantar a música: ${m.numero} - ${m.item}`);
            
            container.innerHTML += `
                <div class="result-item">
                    <div class="action-btn star-btn ${isFav ? 'active' : ''}" onclick="toggleStatus('${m.numero}', 'Favorita', ${!isFav})">
                        <i class="fa-${isFav ? 'solid' : 'regular'} fa-star"></i>
                    </div>
                    <div class="action-btn good-btn ${isBoa ? 'active' : ''}" onclick="toggleStatus('${m.numero}', 'Boa', ${!isBoa})">
                        <i class="fa-solid fa-thumbs-up"></i>
                    </div>
                    <div class="action-btn bad-btn ${isRuim ? 'active' : ''}" onclick="toggleStatus('${m.numero}', 'Ruim', ${!isRuim})">
                        <i class="fa-solid fa-thumbs-down"></i>
                    </div>
                    <div class="action-btn mic-btn ${contagem > 0 ? 'active' : ''}" onclick="registrarCantada('${m.numero}')">
                        <i class="fa-solid fa-microphone"></i>
                        <span class="counter">${contagem > 0 ? contagem : ''}</span>
                    </div>
                    <div class="music-info">
                        <div style="font-size: 14px; font-weight: 500;">${m.item}</div>
                        <div style="color: #f59e0b; font-size: 12px; font-weight:bold;">Nº ${m.numero}</div>
                    </div>
                    <a href="https://api.whatsapp.com/send?text=${msg}" target="_blank" class="whatsapp-btn">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                </div>
            `;
        });
    }

    async function carregarCatalogoTXT() {
        try {
            const resposta = await fetch('CATÁLOGO DE MÚSICAS.txt');
            const texto = await resposta.text();
            const linhas = texto.split(/\r?\n/);
            linhas.forEach(linha => {
                let match = linha.match(/^(\d+)\s+(.+)$/);
                if (match) catalogoMusicas.push({ numero: match[1], item: match[2].trim() });
            });
            filtrarMusicas();
        } catch(e) { console.error("Erro ao carregar catálogo"); }
    }
    window.onload = carregarCatalogoTXT;
</script>
</body>
</html>
